{% extends 'base.html' %}

{% block title %}Update Post{% endblock %}

{% block content %}
<h1>Update Post</h1>

<form action="/board/update/{{ post.id }}/" method="post">
    <p><input type="text" name="title" placeholder="title" value="{{ post.title }}""></p>
    <p><textarea name="content" id="content">{{ post.content }}</textarea></p>
    <p><input type="submit"></p>
</form>

<p><a href="/board/">Cancel</a></p>
{% endblock %}
