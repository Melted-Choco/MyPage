<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My Board{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            {% comment %} max-width: 700px; {% endcomment %}
            margin: 0 20px;
            {% comment %} margin: 0; {% endcomment %}
            padding: 20px;
            background-color: #f9f9f9;
            color: #333;
        }

        header {
            background-color: #3498db;
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            color: white;
        }

        .container {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            {% comment %} max-width: 1000px; {% endcomment %}
            margin: 0 auto;
            padding: 20px;
        }

        aside {
            width: 200px;
            height: auto;
            padding: 20px;
            background-color: #f1f1f1;
            border-right: 1px solid #ddd;
        }

        main {
            flex-grow: 1;
            padding: 20px;
            padding-left: 40px;
            background-color: white;
            border-left: 1px solid #ddd;
        }

        h1 {
            {% comment %} margin-top: 0; {% endcomment %}
            color: #444;
        }

        a {
            color: #3498db;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .button {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            margin-top: 10px;
        }

        .button:hover {
            background-color: #2980b9;
        }

        form input[type="text"],
        form textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        form input[type="submit"] {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        form input[type="submit"]:hover {
            background-color: #27ae60;
        }

        .post-list li {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }

        .post-number {
            width: 30px;
            height: 30px;
            background-color: #3498db;
            color: white;
            font-weight: bold;
            text-align: center;
            line-height: 30px;
            border-radius: 4px;
            margin-right: 10px;
            flex-shrink: 0;
        }

        footer {
            text-align: center;
            color: #aaa;
            padding: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Board</h1>
    </header>

    <div class="container">
        <aside>
            <h2>Menu</h2>
            <ul>
                <li><a href="{% url 'board:index' %}">Home</a></li>
                <li><a href="/board/create/">Create Post</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </aside>

        <main>
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <footer>
        &copy; 2025 My Board. All rights reserved.
    </footer>
</body>
</html>
