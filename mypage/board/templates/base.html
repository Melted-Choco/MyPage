<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My Board{% endblock %}</title>
    <!-- Quill 스타일 및 스크립트 -->
    <link rel="stylesheet" href="https://cdn.quilljs.com/1.3.6/quill.snow.css">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0 20px;
            padding: 20px;
            background-color: #f9f9f9;
            color: #333;
        }

        header {
            background-color: #3498db;
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            color: white;
        }

        .container {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            margin: 0 auto;
            padding: 20px 0;
        }

        aside {
            width: 200px;
            height: auto;
            padding: 20px;
            background-color: #f1f1f1;
            border-right: 1px solid #ddd;
        }

        main {
            flex-grow: 1;
            padding: 20px;
            padding-left: 30px;
            padding-right: 40px;
            background-color: white;
            border-left: 1px solid #ddd;
        }

        h1 {
            color: #444;
        }

        a {
            color: #3498db;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .button {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            margin-top: 10px;
        }

        .button:hover {
            background-color: #2980b9;
        }

        .post-list li {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }

        .post-number {
            width: 30px;
            height: 30px;
            background-color: #3498db;
            color: white;
            font-weight: bold;
            text-align: center;
            line-height: 30px;
            border-radius: 4px;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .pagination {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            }

        .pagination a {
            margin: 0 10px;
            color: #3498db;
            font-weight: bold;
        }

        .pagination span {
            margin: 0 10px;
            color: #555;
        }

        .invisible {
            visibility: hidden;
        }

        #menu-title {
            display: flex;
            cursor: pointer;
            align-items: center;
        }

        #arrow {
            display: inline-block;
            transition: transform 0.3s;
            font-size: 0.85rem;
            margin-right: 8px;
        }

        .rotated {
            transform: rotate(90deg);
        }

        #menu-list {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.4s ease, opacity 0.3s ease;
        }

        #menu-list.open {
            max-height: 500px;
            opacity: 1;
        }

        footer {
            text-align: center;
            color: #aaa;
            padding: 15px;
            font-size: 14px;
        }

        /* create.html */
        #create-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: flex-start;
        }
        
        #create-category,
        #create-title {
            padding: 0px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            height: 44px;
        }

        #create-category {
            width: 120px;
            background-color: white;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D'10'%20height%3D'5'%20viewBox%3D'0%200%2010%205'%20xmlns%3D'http%3A//www.w3.org/2000/svg'%3E%3Cpath%20d%3D'M0%200l5%205%205-5z'%20fill%3D'%23666'%20/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 10px 5px;
        }

        #create-title {
            flex: 1;
            min-width: 0;
        }
        
        #editor-container {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            margin-bottom: 12px;
        }

        {% comment %} #create-content {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin-bottom: 12px;
            resize: none;
        } {% endcomment %}

        #create-group-date {
            width: 120px;
        }

        label[for="create-date"] {
            position: relative;
            padding-left: 25px;
            margin-left: 10px;
            cursor: pointer;
            font-size: 12px;
            line-height: 16px;
            user-select: none;
        }

        label[for="create-date"]::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            width: 16px;
            height: 16px;
            border: 2px solid #3498db;
            border-radius: 4px;
            background-color: white;
            box-sizing: border-box;
            transition: background-color 0.2s, border-color 0.2s;
        }

        #create-date:checked + label::before {
            background-color: #3498db;
            border-color: #3498db;
        }

        #create-date:checked + label::after {
            content: "✔";
            position: absolute;
            left: 3px;
            top: 0px;
            font-size: 12px;
            color: white;
        }

        #selected-date {
            display: none;
            margin-top: 5px;
            margin-left: 10px;
            width: 100px;
        }

        .submit-button {
            background-color: #2ecc71;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .submit-button:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Board</h1>
    </header>

    <div class="container">
        <aside>
            <h2 id="menu-title">
                <span id="arrow">▶</span>
                Menu
            </h2>
            <ul id="menu-list">
                <li><a href="{% url 'board:index' %}">Home</a></li>
                <li><a href="/board/create/">Create Post</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <h2>Test</h2>
        </aside>

        <main>
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <footer>
        &copy; 2025 My Board. All rights reserved.
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const menuTitle = document.getElementById("menu-title");
            const menuList = document.getElementById("menu-list");
            const arrow = document.getElementById("arrow");

            const checkbox = document.getElementById("create-date");
            const selectedDate = document.getElementById("selected-date");

            menuTitle.addEventListener("click", function() {
                menuList.classList.toggle("open");
                arrow.classList.toggle("rotated");
            });

            checkbox.addEventListener("change", function() {
                selectedDate.style.display = this.checked ? 'block' : 'none';
            });
        });

        const Size = Quill.import('attributors/style/size');
        Size.whitelist = ['10px', '12px', '16px', '20px', '32px', '48px'];
        Quill.register(Size, true);
        const quill = new Quill('#editor-container', {
            modules: {
                toolbar: '#toolbar'
            },
            theme: 'snow'
        });
        document.querySelector('form').addEventListener('submit', function() {
            document.querySelector('#create-content').value = quill.root.innerHTML;
        });
    </script>
</body>
</html>
